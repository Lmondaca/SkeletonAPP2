<ion-app>
  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar>
        <ion-title>Menú</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list>
        <ion-menu-toggle auto-hide="false">
          <ion-item button routerLink="/home" routerDirection="root">
            <ion-label>Home</ion-label>
          </ion-item>
          <ion-item button routerLink="/perfil" routerDirection="root">
            <ion-label>Perfil</ion-label>
          </ion-item>
          <ion-item button routerLink="/movimiento" routerDirection="root">
            <ion-label>Movimiento</ion-label>
          </ion-item>
          <ion-item button routerLink="/movimientos" routerDirection="root">
            <ion-label>Movimientos</ion-label>
          </ion-item>
          <ion-item button routerLink="/auto-movi" routerDirection="root">
            <ion-label>Movimiento Automático</ion-label>
          </ion-item>
          <ion-item button routerLink="/resumen" routerDirection="root">
            <ion-label>Resumen</ion-label>
          </ion-item>
          <ion-item button (click)="cerrarSesion()">
            <ion-label>Cerrar Sesión</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
