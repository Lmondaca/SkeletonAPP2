<ion-header [translucent]="true">
  <ion-toolbar>
   <div style="text-align: center; background-color: #000000;">
    <img src="assets/icon/skull-skeleton-icon.png" alt="Logo" style="  margin: 10px auto; width: 30%; height: 30px;">
    <img src="assets/icon/skull-skeleton-icon.png" alt="Logo" style=" padding-left: 5px; margin: 10px auto; width: 30%; height: 30px;">
    <img src="assets/icon/skull-skeleton-icon.png" alt="Logo" style="padding-left: 5px; margin: 10px auto; width: 30%; height: 30px;">
  </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" >

  <div class="login-wrapper ion-text-center">
    <img src="assets/img/png-clipart-blog-internet-meme-information-skeleton-human-meme.png" alt="Logo" style="display: block; margin: 20px auto; width: 100px; height: 200px;">
    <h1>
      ¡Bienvenido a Skeleton App!
    </h1>
    <form #loginForm="ngForm">
      <ion-text class="ion-padding-top">
        <ion-input label="Nombre de Usuario" labelPlacement="floating" placeholder="Ingrese su usuario"
          name="usuario" [(ngModel)]="usuario" #usuarioField="ngModel"
          required minlength="3" maxlength="8" pattern="^[a-zA-Z0-9]+$"></ion-input>
      </ion-text>
      <ion-note color="danger" *ngIf="usuarioField.invalid && usuarioField.touched">
        El usuario debe ser alfanumérico, entre 3 y 8 caracteres.
      </ion-note>

      <ion-text class="ion-padding-top">
        <ion-input label="Contraseña" labelPlacement="floating" type="password" placeholder="Ingrese su Contraseña"
          name="contrasena" [(ngModel)]="contrasena" #contrasenaField="ngModel"
          required maxlength="4" inputmode="numeric" pattern="^[0-9]{4}$"></ion-input>
      </ion-text>
      <ion-note color="danger" *ngIf="contrasenaField.invalid && contrasenaField.touched">
        La contraseña debe ser numérica de 4 dígitos.
      </ion-note>

      <div class="ion-padding-top ">
        <ion-button color="medium" [disabled]="loginForm.invalid" (click)="ingresar()">Iniciar Sesión</ion-button> <ion-button color="medium" (click)="irRegistro()">Registrar</ion-button>
      </div>
    </form>

  </div>
  
</ion-content>
